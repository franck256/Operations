<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entraînement : Opérations Posées (6ème)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcf4;
            color: #2c3e50;
            max-width: 750px;
            margin: 40px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            background: white;
        }
        h1 {
            color: #2980b9;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .step-panel {
            display: none;
        }
        .step-panel.active {
            display: block;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        input:focus {
            border-color: #3498db;
        }
        .div-inputs {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .div-inputs div {
            flex: 1;
        }
        .consigne {
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        
        /* Conteneur global pour centrer l'affichage du calcul */
        .operation-container {
            display: flex;
            justify-content: center;
            margin: 25px 0;
        }

        /* Style pour l'alignement des opérations standards (+, -, x) */
        .operation-standard {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.4em;
            font-weight: bold;
            line-height: 1.2;
            text-align: right;
            display: inline-block;
            padding: 10px 20px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #e9ecef;
            letter-spacing: 2px;
        }
        .barre-calcul {
            border: none;
            border-top: 3px solid #2c3e50;
            margin: 5px 0 0 0;
            padding: 0;
        }

        /* Style pour la vraie potence de division */
        .potence-division {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.4em;
            font-weight: bold;
            border-collapse: collapse;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        .potence-division td {
            padding: 10px 25px;
            text-align: center;
            border: none;
        }
        .td-dividend {
            text-align: right !important;
            padding-right: 20px !important;
        }
        .td-divisor {
            border-left: 4px solid #2c3e50 !important;
            text-align: left !important;
            padding-left: 20px !important;
        }
        .td-quotient {
            border-left: 4px solid #2c3e50 !important;
            border-top: 4px solid #2c3e50 !important;
            text-align: left !important;
            padding-left: 20px !important;
            color: #7f8c8d;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button.action-btn {
            flex: 1;
            padding: 14px;
            font-size: 1em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-start { background-color: #2980b9; color: white; width: 100%; padding: 14px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1em;}
        .btn-start:hover { background-color: #1f618d; }
        .btn-submit { background-color: #2ecc71; color: white; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-skip { background-color: #7f8c8d; color: white; }
        .btn-skip:hover { background-color: #6c7a7d; }
        
        .progress-bar {
            background-color: #e0e0e0;
            border-radius: 4px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #3498db;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .indicator {
            text-align: right;
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        .result-box {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 6px;
            border-left: 5px solid #2980b9;
            margin-top: 20px;
            text-align: center;
        }
        .result-box h2 { margin-top: 0; color: #2c3e50; }
        
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.95em;
        }
        table.bilan th, table.bilan td {
            border: 1px solid #dcdde1;
            padding: 10px;
            text-align: left;
        }
        table.bilan th {
            background-color: #f5f6fa;
            color: #353b48;
        }
        .row-correct { background-color: #d4edda; color: #155724; }
        .row-incorrect { background-color: #f8d7da; color: #721c24; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .badge-success { background-color: #2ecc71; color: white; }
        .badge-danger { background-color: #e74c3c; color: white; }
    </style>
</head>
<body>

    <h1>Calcul Posé : Les 4 Opérations</h1>

    <!-- ÉTAPE 1 : Inscription de l'élève -->
    <div id="panel-login" class="step-panel active">
        <label for="student-name">Entrez votre nom et votre prénom :</label>
        <div style="margin-bottom: 15px;">
            <input type="text" id="student-name" placeholder="Ex: Lucas Simon">
        </div>
        <button class="btn-start" onclick="startTest()">Commencer l'évaluation</button>
    </div>

    <!-- ÉTAPE 2 : Zone d'exercices -->
    <div id="panel-quiz" class="step-panel">
        <div class="indicator">Question <span id="current-q">1</span> / 5</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Effectue le calcul posé ci-dessous :</div>
        
        <!-- Zone d'affichage de l'opération correctement mise en forme -->
        <div class="operation-container" id="q-operation-container"></div>
        
        <!-- Inputs dynamiques selon le type d'opération -->
        <div id="normal-input-zone">
            <label for="user-answer">Réponse :</label>
            <input type="text" id="user-answer" placeholder="Inscris le résultat" autocomplete="off">
        </div>
        
        <div id="division-input-zone" style="display:none;">
            <div class="div-inputs">
                <div>
                    <label for="user-quotient">Quotient :</label>
                    <input type="number" id="user-quotient" placeholder="Ex: 24" autocomplete="off">
                </div>
                <div>
                    <label for="user-reste">Reste :</label>
                    <input type="number" id="user-reste" placeholder="Ex: 3" autocomplete="off">
                </div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="action-btn btn-skip" onclick="skipQuestion()">Passer</button>
            <button class="action-btn btn-submit" onclick="submitAnswer()">Valider la réponse</button>
        </div>
    </div>

    <!-- ÉTAPE 3 : Fin de séance et Bilan -->
    <div id="panel-results" class="step-panel">
        <div class="result-box">
            <h2>Résultats de l'évaluation</h2>
            <p><strong>Élève :</strong> <span id="res-name">...</span></p>
            <p><strong>Note :</strong> <span id="res-grade" style="font-size: 2.2em; color: #27ae60; font-weight: bold;">0 / 5</span></p>
        </div>

        <h3 style="margin-top:25px; color:#2c3e50; border-bottom:2px solid #bdc3c7; padding-bottom:5px;">Correction détaillée</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Opération</th>
                    <th>Ta réponse</th>
                    <th>Correction</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body">
                <!-- Rempli dynamiquement -->
            </tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="location.reload()">Refaire une autre série</button>
    </div>

    <script>
        let quizQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let studentName = "";

        // Génère le code HTML d'une opération standard propre (avec le trait bien en dessous)
        function generateStandardHTML(num1, num2, operator) {
            const s1 = num1.toString();
            const s2 = operator + " " + num2.toString();
            const maxLength = Math.max(s1.length, s2.length);
            
            const line1 = s1.padStart(maxLength, ' '); // Espaces insécables pour l'alignement
            const line2 = s2.padStart(maxLength, ' ');
            
            return `<div class="operation-standard">${line1}<br>${line2}<hr class="barre-calcul"></div>`;
        }

        // Génère le code HTML d'une vraie potence de division
        function generateDivisionHTML(dividend, divisor) {
            return `
                <table class="potence-division">
                    <tr>
                        <td class="td-dividend">${dividend}</td>
                        <td class="td-divisor">${divisor}</td>
                    </tr>
                    <tr>
                        <td style="color: transparent;">...</td>
                        <td class="td-quotient">?</td>
                    </tr>
                </table>
            `;
        }

        function buildQuiz() {
            quizQuestions = [];
            
            const generators = [
                // 1. ADDITION
                () => {
                    const n1 = Math.floor(Math.random() * (8999 - 1200) + 1200);
                    const n2 = Math.floor(Math.random() * (999 - 450) + 450);
                    return {
                        type: "Addition",
                        htmlContent: generateStandardHTML(n1, n2, "+"),
                        flatExpr: `${n1} + ${n2}`,
                        check: (user) => user.replace(/\s+/g, '') === (n1 + n2).toString(),
                        userDisplay: (user) => user,
                        correctDisplay: (n1 + n2).toString()
                    };
                },
                // 2. SOUSTRACTION
                () => {
                    const n1 = Math.floor(Math.random() * (5400 - 2100) + 2100);
                    const u1 = n1 % 10;
                    const u2 = u1 === 9 ? 8 : u1 + 1; 
                    const n2 = Math.floor(Math.random() * (19 - 1) + 1) * 100 + Math.floor(Math.random() * 9) * 10 + u2;
                    return {
                        type: "Soustraction",
                        htmlContent: generateStandardHTML(n1, n2, "-"),
                        flatExpr: `${n1} - ${n2}`,
                        check: (user) => user.replace(/\s+/g, '') === (n1 - n2).toString(),
                        userDisplay: (user) => user,
                        correctDisplay: (n1 - n2).toString()
                    };
                },
                // 3. MULTIPLICATION
                () => {
                    const n1 = Math.floor(Math.random() * (450 - 110) + 110);
                    const n2 = Math.floor(Math.random() * (89 - 12) + 12);
                    return {
                        type: "Multiplication",
                        htmlContent: generateStandardHTML(n1, n2, "×"),
                        flatExpr: `${n1} × ${n2}`,
                        check: (user) => user.replace(/\s+/g, '') === (n1 * n2).toString(),
                        userDisplay: (user) => user,
                        correctDisplay: (n1 * n2).toString()
                    };
                },
                // 4. DIVISION EUCLIDIENNE
                () => {
                    const divisor = Math.floor(Math.random() * (25 - 6) + 6);
                    const quotient = Math.floor(Math.random() * (80 - 15) + 15);
                    const reste = Math.floor(Math.random() * divisor);
                    const dividend = (divisor * quotient) + reste;

                    return {
                        type: "Division Euclidienne",
                        htmlContent: generateDivisionHTML(dividend, divisor),
                        flatExpr: `${dividend} ÷ ${divisor}`,
                        isDivision: true,
                        check: (userQ, userR) => parseInt(userQ) === quotient && parseInt(userR) === reste,
                        userDisplay: (q, r) => `Q: ${q || 0}, R: ${r || 0}`,
                        correctDisplay: `Q: ${quotient}, R: ${reste}`
                    };
                }
            ];

            let chosen = [...generators];
            chosen.push(generators[Math.floor(Math.random() * generators.length)]);
            chosen = chosen.sort(() => 0.5 - Math.random());

            for (let i = 0; i < 5; i++) {
                quizQuestions.push(chosen[i]());
            }
        }

        function startTest() {
            const nameInput = document.getElementById("student-name").value.trim();
            if (nameInput === "") {
                alert("Veuillez entrer votre nom.");
                return;
            }
            studentName = nameInput;
            buildQuiz();
            showPanel("panel-quiz");
            loadQuestion();
        }

        function showPanel(panelId) {
            document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        function loadQuestion() {
            if (currentIndex >= 5) {
                endTest();
                return;
            }

            const q = quizQuestions[currentIndex];
            document.getElementById("current-q").innerText = currentIndex + 1;
            document.getElementById("q-operation-container").innerHTML = q.htmlContent;
            
            if (q.isDivision) {
                document.getElementById("q-consigne").innerText = "Pose la division euclidienne et trouve le quotient entier et le reste :";
                document.getElementById("normal-input-zone").style.display = "none";
                document.getElementById("division-input-zone").style.display = "block";
                document.getElementById("user-quotient").value = "";
                document.getElementById("user-reste").value = "";
                document.getElementById("user-quotient").focus();
            } else {
                document.getElementById("q-consigne").innerText = "Effectue le calcul posé suivant :";
                document.getElementById("normal-input-zone").style.display = "block";
                document.getElementById("division-input-zone").style.display = "none";
                document.getElementById("user-answer").value = "";
                document.getElementById("user-answer").focus();
            }
            
            const progress = (currentIndex / 5) * 100;
            document.getElementById("progress-fill").style.width = progress + "%";
        }

        function submitAnswer() {
            const q = quizQuestions[currentIndex];
            let isCorrect = false;

            if (q.isDivision) {
                const uQ = document.getElementById("user-quotient").value.trim();
                const uR = document.getElementById("user-reste").value.trim();
                if (uQ === "" || uR === "") {
                    alert("Veuillez remplir le quotient et le reste.");
                    return;
                }
                isCorrect = q.check(uQ, uR);
                q.savedAns = q.userDisplay(uQ, uR);
            } else {
                const uAns = document.getElementById("user-answer").value.trim();
                if (uAns === "") {
                    alert("Veuillez inscrire un résultat.");
                    return;
                }
                isCorrect = q.check(uAns);
                q.savedAns = q.userDisplay(uAns);
            }

            if (isCorrect) {
                score++;
                q.isCorrect = true;
            }

            currentIndex++;
            loadQuestion();
        }

        function skipQuestion() {
            const q = quizQuestions[currentIndex];
            q.isCorrect = false;
            q.savedAns = "Passée";
            currentIndex++;
            loadQuestion();
        }

        function endTest() {
            showPanel("panel-results");
            document.getElementById("res-name").innerText = studentName;
            document.getElementById("res-grade").innerText = `${score} / 5`;
            
            if (score >= 4) document.getElementById("res-grade").style.color = "#2ecc71";
            else if (score >= 2.5) document.getElementById("res-grade").style.color = "#e67e22";
            else document.getElementById("res-grade").style.color = "#e74c3c";

            const tableBody = document.getElementById("bilan-table-body");
            tableBody.innerHTML = ""; 

            quizQuestions.forEach(q => {
                const row = document.createElement("tr");
                row.className = q.isCorrect ? "row-correct" : "row-incorrect";

                row.innerHTML = `
                    <td><strong>${q.type}</strong></td>
                    <td style="font-family:monospace; font-size:1.1em;">${q.flatExpr}</td>
                    <td>${q.savedAns}</td>
                    <td>${q.isCorrect ? '<span class="badge badge-success">Juste !</span>' : `<span class="badge badge-danger">Attendu : ${q.correctDisplay}</span>`}</td>
                `;
                tableBody.appendChild(row);
            });
        }
    </script>
</body>
</html>
